<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 400px; height: 400px; overflow: hidden; }
  .container {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle at 30% 30%, #B76EFF, #9945FF 50%, #6B1FD4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Ambient glow */
  .container::before {
    content: '';
    position: absolute;
    top: -40px;
    left: -40px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
  }
  .container::after {
    content: '';
    position: absolute;
    bottom: -60px;
    right: -60px;
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, rgba(20,241,149,0.1) 0%, transparent 70%);
  }
  .mascot {
    width: 260px;
    height: 270px;
    object-fit: contain;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.3));
    margin-top: -20px;
  }
  .wordmark {
    font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: -1.5px;
    margin-top: -8px;
    position: relative;
    z-index: 2;
    text-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  /* Floating particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    z-index: 1;
  }
  .p1 { width: 8px; height: 8px; background: #FFD166; top: 45px; left: 50px; opacity: 0.8; }
  .p2 { width: 6px; height: 6px; background: #14F195; top: 65px; right: 55px; opacity: 0.7; }
  .p3 { width: 5px; height: 5px; background: #FF8FCE; bottom: 80px; left: 40px; opacity: 0.6; }
  .p4 { width: 4px; height: 4px; background: #FFFFFF; top: 120px; left: 85px; opacity: 0.4; }
  .p5 { width: 6px; height: 6px; background: #FFD166; bottom: 90px; right: 45px; opacity: 0.5; }
  .p6 { width: 3px; height: 3px; background: #14F195; top: 160px; right: 70px; opacity: 0.5; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>
  <img class="mascot" src="/assets/imp-expressions/confident.png" alt="Raze">
  <div class="wordmark">raze</div>
</div>
</body>
</html>
