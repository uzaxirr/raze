<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <radialGradient id="pfpBg" cx="0.3" cy="0.3" r="1">
      <stop offset="0%" stop-color="#B76EFF"/>
      <stop offset="50%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#7B2FE0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#pfpBg)"/>

  <!-- Subtle glow behind mascot -->
  <circle cx="200" cy="190" r="160" fill="url(#glow)"/>

  <!-- Decorative particles -->
  <circle cx="55" cy="50" r="6" fill="#FFD166" opacity="0.75"/>
  <circle cx="345" cy="75" r="4" fill="#14F195" opacity="0.8"/>
  <circle cx="45" cy="320" r="5" fill="#FF8FCE" opacity="0.65"/>
  <circle cx="355" cy="340" r="4" fill="#FFD166" opacity="0.7"/>
  <circle cx="80" cy="90" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="320" cy="310" r="3" fill="#FFFFFF" opacity="0.4"/>

  <!-- Imp mascot centered -->
  <image href="/assets/imp-expressions/waving.png" x="50" y="30" width="300" height="310" preserveAspectRatio="xMidYMid meet"/>

  <!-- raze.fun text at bottom -->
  <text x="200" y="378" text-anchor="middle" font-family="Space Grotesk, Inter, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" opacity="0.9">raze.fun</text>
</svg>
