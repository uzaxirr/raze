<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1500px; height: 500px; overflow: hidden; }
  .banner {
    width: 1500px;
    height: 500px;
    background: #050008;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  /* Gradient mesh background */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 15% 40%, rgba(153,69,255,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 500px 350px at 85% 60%, rgba(20,241,149,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 300px 300px at 50% 90%, rgba(153,69,255,0.06) 0%, transparent 70%);
  }

  /* Subtle grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(153,69,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(153,69,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Noise texture overlay */
  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.8'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  .content {
    position: relative;
    z-index: 2;
    padding-left: 120px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }
  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #9945FF;
    box-shadow: 0 0 12px rgba(153,69,255,0.6);
  }
  .logo-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #9945FF;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .wordmark {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 140px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: -6px;
    line-height: 1;
  }

  .tagline {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 26px;
    color: #6B6B7B;
    letter-spacing: -0.2px;
    margin-top: 4px;
  }
  .tagline strong {
    color: #AAAAAA;
    font-weight: 500;
  }

  .pills {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .pill {
    padding: 8px 18px;
    border-radius: 20px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid;
  }
  .pill-purple { color: #B76EFF; border-color: rgba(153,69,255,0.3); background: rgba(153,69,255,0.08); }
  .pill-green { color: #14F195; border-color: rgba(20,241,149,0.3); background: rgba(20,241,149,0.06); }
  .pill-yellow { color: #FFD166; border-color: rgba(255,209,102,0.3); background: rgba(255,209,102,0.06); }
  .pill-pink { color: #FF8FCE; border-color: rgba(255,143,206,0.3); background: rgba(255,143,206,0.06); }
  .pill-white { color: #CCCCCC; border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }

  .links {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-top: 12px;
  }
  .link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: #555566;
  }
  .link-accent { color: #9945FF; }
  .link-sep { color: #2A2A3A; }

  /* Mascot */
  .mascot-wrap {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
  }
  .mascot-glow {
    position: absolute;
    width: 500px;
    height: 500px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(153,69,255,0.2) 0%, rgba(153,69,255,0.05) 40%, transparent 70%);
    z-index: -1;
  }
  .mascot {
    width: 380px;
    height: 400px;
    object-fit: contain;
    filter: drop-shadow(0 12px 40px rgba(153,69,255,0.4));
  }

  /* Accent line */
  .accent-line {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, #9945FF, #14F195, #9945FF);
    opacity: 0.6;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="noise"></div>

  <div class="content">
    <div class="logo-row">
      <div class="logo-dot"></div>
      <div class="logo-label">Solana AI Agent</div>
    </div>
    <div class="wordmark">raze</div>
    <div class="tagline">Everything Solana in <strong>one chat</strong></div>
    <div class="pills">
      <div class="pill pill-purple">Swap</div>
      <div class="pill pill-green">Research</div>
      <div class="pill pill-yellow">Alert</div>
      <div class="pill pill-pink">Track</div>
      <div class="pill pill-white">Snipe</div>
    </div>
    <div class="links">
      <span class="link link-accent">raze.fun</span>
      <span class="link link-sep">·</span>
      <span class="link">@razeaii_bot</span>
    </div>
  </div>

  <div class="mascot-wrap">
    <div class="mascot-glow"></div>
    <img class="mascot" src="/assets/imp-expressions/waving.png" alt="Raze">
  </div>

  <div class="accent-line"></div>
</div>
</body>
</html>
