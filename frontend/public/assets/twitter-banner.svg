<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500">
      <stop offset="0%" stop-color="#0A0012"/>
      <stop offset="50%" stop-color="#120024"/>
      <stop offset="100%" stop-color="#0A0018"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.2" cy="0.3">
      <stop offset="0%" stop-color="#9945FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9945FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.8" cy="0.7">
      <stop offset="0%" stop-color="#14F195" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14F195" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mascotGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#9945FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9945FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Decorative blur orbs -->
  <circle cx="200" cy="150" r="350" fill="url(#orb1)"/>
  <circle cx="1300" cy="400" r="300" fill="url(#orb2)"/>

  <!-- Grid lines for tech feel -->
  <line x1="0" y1="250" x2="1500" y2="250" stroke="#9945FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="500" y1="0" x2="500" y2="500" stroke="#9945FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="1000" y1="0" x2="1000" y2="500" stroke="#9945FF" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Decorative particles -->
  <circle cx="120" cy="80" r="3" fill="#FFD166" opacity="0.6"/>
  <circle cx="680" cy="60" r="2" fill="#14F195" opacity="0.5"/>
  <circle cx="450" cy="420" r="2.5" fill="#FF8FCE" opacity="0.4"/>
  <circle cx="900" cy="90" r="2" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="350" cy="150" r="1.5" fill="#14F195" opacity="0.4"/>

  <!-- raze wordmark -->
  <text x="420" y="200" font-family="Space Grotesk, sans-serif" font-size="120" font-weight="700" fill="#FFFFFF" letter-spacing="-5">raze</text>

  <!-- Tagline -->
  <text x="425" y="260" font-family="Inter, sans-serif" font-size="28" fill="#888888" letter-spacing="0.5">Everything Solana in one chat</text>

  <!-- Feature pills -->
  <rect x="425" y="300" width="100" height="32" rx="16" fill="#9945FF" fill-opacity="0.15" stroke="#9945FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="475" y="321" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#B76EFF">Trade</text>

  <rect x="540" y="300" width="115" height="32" rx="16" fill="#14F195" fill-opacity="0.1" stroke="#14F195" stroke-opacity="0.3" stroke-width="1"/>
  <text x="597" y="321" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#14F195">Research</text>

  <rect x="670" y="300" width="95" height="32" rx="16" fill="#FFD166" fill-opacity="0.1" stroke="#FFD166" stroke-opacity="0.3" stroke-width="1"/>
  <text x="717" y="321" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#FFD166">Alert</text>

  <rect x="780" y="300" width="100" height="32" rx="16" fill="#FF8FCE" fill-opacity="0.1" stroke="#FF8FCE" stroke-opacity="0.3" stroke-width="1"/>
  <text x="830" y="321" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#FF8FCE">Watch</text>

  <!-- raze.fun URL -->
  <text x="425" y="400" font-family="JetBrains Mono, monospace" font-size="16" fill="#9945FF" opacity="0.8">raze.fun</text>
  <text x="560" y="400" font-family="Inter, sans-serif" font-size="14" fill="#555555">•</text>
  <text x="580" y="400" font-family="JetBrains Mono, monospace" font-size="16" fill="#555555">@razeaii_bot</text>

  <!-- Mascot glow -->
  <circle cx="1150" cy="250" r="200" fill="url(#mascotGlow)"/>

  <!-- Imp mascot - right side -->
  <image href="/assets/imp-expressions/waving.png" x="980" y="40" width="420" height="440" preserveAspectRatio="xMidYMid meet"/>
</svg>
