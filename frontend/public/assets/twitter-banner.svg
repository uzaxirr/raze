<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500">
      <stop offset="0%" stop-color="#FAFAFE"/>
      <stop offset="50%" stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#EDFFF5"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.3" cy="0.3">
      <stop offset="0%" stop-color="#9945FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9945FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.7" cy="0.7">
      <stop offset="0%" stop-color="#14F195" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#14F195" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Decorative blur orbs -->
  <circle cx="100" cy="100" r="350" fill="url(#orb1)"/>
  <circle cx="1350" cy="450" r="300" fill="url(#orb2)"/>

  <!-- Logo: ghost + raze.fun (top) -->
  <g transform="translate(420, 60)">
    <svg width="38" height="42" viewBox="0 0 200 220">
      <path d="M100 25 C60 25, 32 58, 32 98 L32 155 C32 161, 38 165, 46 160 C58 161, 64 166, 80 161 C97 166, 113 161, 146 161 C165 166, 168 150, 168 98 C168 58, 140 25, 100 25Z" fill="#9945FF"/>
