    </svg>
    <text x="52" y="32" font-family="Space Grotesk, sans-serif" font-size="28" font-weight="700" fill="#1A1A1A">raze.fun</text>
  </g>

  <!-- Headline (vertically centered, clear of profile circle) -->
  <text x="420" y="230" font-family="Space Grotesk, sans-serif" font-size="68" font-weight="700" fill="#1A1A1A" letter-spacing="-2.7">
    <tspan x="420" dy="0">Your crypto friend</tspan>
    <tspan x="420" dy="78">who never sleeps</tspan>
  </text>

  <!-- Tagline (above the profile circle danger zone) -->
  <text x="420" y="420" font-family="Inter, sans-serif" font-size="19" fill="#666666">
    <tspan x="420" dy="0">Trade, research, and explore Solana through natural</tspan>
    <tspan x="420" dy="26">conversation. All in one Telegram chat.</tspan>
  </text>

  <!-- Large ghost mascot waving - right side -->
  <g transform="translate(1080, 60)">
    <svg width="360" height="396" viewBox="0 0 260 260">
      <ellipse cx="130" cy="120" rx="80" ry="75" fill="#9945FF" opacity="0.05"/>
      <path d="M130 40 C90 40, 62 72, 62 110 L62 168 C62 173, 68 177, 76 172 C83 168, 88 173, 94 178 C100 183, 105 178, 110 173 C116 168, 121 173, 127 178 C133 183, 138 178, 143 173 C149 168, 154 173, 160 178 C166 183, 171 178, 176 173 C182 168, 188 173, 195 178 C202 173, 198 168, 198 163 L198 110 C198 72, 170 40, 130 40Z" fill="#9945FF"/>
