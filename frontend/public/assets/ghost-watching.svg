<svg width="200" height="220" viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M100 25 C60 25, 32 58, 32 98 L32 155 C32 161, 38 165, 46 160 C53 156, 58 161, 64 166 C70 171, 75 166, 80 161 C86 156, 91 161, 97 166 C103 171, 108 166, 113 161 C119 156, 124 161, 130 166 C136 171, 141 166, 146 161 C152 156, 158 161, 165 166 C172 161, 168 155, 168 150 L168 98 C168 58, 140 25, 100 25Z" fill="#9945FF"/>
  <path d="M65 40 C50 55, 42 78, 42 98" stroke="#B76EFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Left eye closed (squinting through telescope) -->
  <path d="M62 88 C70 82, 86 82, 94 88" stroke="#2D1B69" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Right eye — wide open, focused -->
  <g>
    <ellipse cx="126" cy="86" rx="20" ry="22" fill="#FFFFFF"/>
    <ellipse cx="126" cy="86" rx="14" ry="16" fill="#2D1B69"/>
    <ellipse cx="129" cy="83" rx="8" ry="9" fill="#1A1040"/>
    <ellipse cx="126" cy="80" rx="3.5" ry="3" fill="#FFFFFF" opacity="0.95"/>
  </g>
  <!-- Telescope — held by left arm -->
  <path d="M32 98 C22 90, 14 78, 8 64" stroke="#9945FF" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Telescope barrel -->
  <rect x="-10" y="42" width="40" height="14" rx="4" fill="#5A3A8A" transform="rotate(-25, 10, 49)"/>
  <rect x="-14" y="44" width="14" height="10" rx="3" fill="#7B4FBF" transform="rotate(-25, -7, 49)"/>
  <!-- Lens glint -->
  <circle cx="-4" cy="45" r="5" fill="#89CFF0" opacity="0.3" transform="rotate(-25, -4, 45)"/>
  <!-- Telescope rim -->
  <ellipse cx="-6" cy="46" rx="6" ry="5" stroke="#4A2A7A" stroke-width="2" fill="none" transform="rotate(-25, -6, 46)"/>
  <!-- Focused small mouth -->
  <ellipse cx="102" cy="120" rx="7" ry="5" fill="#7B2FE0"/>
